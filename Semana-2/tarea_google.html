<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea: Estructura de Google</title>
</head>
<body>
    <!-- 1. Encabezado (Header) -->
    <header>
        <nav>
            <a href="#">Gmail</a>
            <a href="#">Imágenes</a>
            <button>Iniciar sesión</button>
        </nav>
    </header>

    <!-- 2. Contenido Principal (Main) -->
    <main>
        <section id="logo">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
        </section>

        <section id="busqueda">
            <form action="#">
                <!-- Entrada de búsqueda (Input) -->
                <input type="text" placeholder="Buscar en Google...">
                <div class="botones">
                    <!-- Botones -->
                    <button type="submit">Buscar con Google</button>
                    <button type="button">Voy a tener suerte</button>
                </div>
            </form>
        </section>
    </main>

    <!-- 3. Pie de página (Footer) -->
    <footer>
        <p>Ecuador</p>
        <nav>
            <a href="#">Publicidad</a>
            <a href="#">Negocios</a>
            <a href="#">Privacidad</a>
            <a href="#">Condiciones</a>
        </nav>
    </footer>
</body>
</html>
